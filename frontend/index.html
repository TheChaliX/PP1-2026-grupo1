<main>
    <form>

        <input type="text" id="ubicacion" name="ubicacion" placeholder="Ej: cordoba" required>

           <label><input type="checkbox" name="estacionamiento"> Estacionamiento</label>
           </fieldset>
          
           <label for="tarifa-minima">tarifa minima</label>
           <input type="number" id= "tarifa-minima" name="tarifa-minima" required>

           <label for="tarifa-maxima">tarifa maxima</label>
           <input type="number" id= "tarifa-maxima" name="tarifa-maxima" required>
