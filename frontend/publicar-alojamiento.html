<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar alojamiento</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="publicar">

    <main class="publicar-main">

        <p class="volver">
            <a href="index.html">← Volver al inicio</a>
        </p>

        <h1>Publicar alojamiento</h1>

       <form>

    <label for="nombre">Nombre del alojamiento</label>
    <input
        type="text"
        id="nombre"
        name="nombre"
        required
    >

    <label for="descripcion">Descripción</label>
    <textarea
        id="descripcion"
        name="descripcion"
        rows="5"
        required
    ></textarea>

    <label for="ubicacion">Ubicación</label>
    <input
        type="text"
        id="ubicacion"
        name="ubicacion"
        required
    >
    <label for="tipo">Tipo de alojamiento</label>
<select
    id="tipo"
    name="tipo"
    required
>
    <option value="">Seleccione una opción</option>
    <option>Cabaña</option>
    <option>Casa</option>
    <option>Departamento</option>
    <option>Hotel</option>
</select>

    <fieldset>

    <legend>Precio y capacidad</legend>

    <div class="fila-datos">

        <div>
            <label for="precioNoche">Precio/Noche</label>
            <input type="number" id="precioNoche" name="precioNoche" min="0" required>
        </div>

        <div>
            <label for="huespedes">Huéspedes</label>
            <input type="number" id="huespedes" name="huespedes" min="1" required>
        </div>

        <div>
            <label for="habitaciones">Habitaciones</label>
            <input type="number" id="habitaciones" name="habitaciones" min="1" required>
        </div>

        <div>
            <label for="camas">Camas</label>
            <input type="number" id="camas" name="camas" min="1" required>
        </div>

    </div>

    </fieldset>
    <fieldset>

        <legend>Servicios</legend>

        <label>
            <input type="checkbox" name="servicios">
            Wi-Fi
        </label>

        <label>
            <input type="checkbox" name="servicios">
            Cocina
        </label>

        <label>
            <input type="checkbox" name="servicios">
            Pileta
        </label>

        <label>
            <input type="checkbox" name="servicios">
            Estacionamiento
        </label>

    </fieldset>

    <label for="fotos">Cargar imágenes</label>
    <input
        type="file"
        id="fotos"
        name="fotos"
        accept="image/*"
        multiple
    >
    
    <div class="botones-publicar">
    <button type="submit">
        Publicar
    </button>
</div>

</div>

</form>

    </main>

    <footer>
    <small>Grupo 1 — PP1 2026</small>
</footer>

</body>

</html>
