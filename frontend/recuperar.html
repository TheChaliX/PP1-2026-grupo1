<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Recuperar acceso</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="login">

    <header>

        <h1>Sistema de reservas</h1>

        <p>Recuperación de acceso</p>

    </header>

    <main>

        <form>
            <p>
                Ingresá tu correo electrónico y te enviaremos
                instrucciones para recuperar el acceso.
            </p>

            <label for="email">
                Correo electrónico
            </label>

            <input
                type="email"
                id="email"
                name="email"
                placeholder="Ingresa tu correo"
                required
            >

            <button type="submit">
                Recuperar acceso
            </button>

            <a href="login.html">
                Volver al inicio de sesión
            </a>

        </form>

    </main>
    <footer>
    <small>Grupo 1 — PP1 2026</small>
</footer>

</body>

</html>
